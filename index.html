    <!-- ═══ CRITICAL CSS ════════════════════════════════════════════════════════════ -->
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
      body{background:#020617;color:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;overflow-x:hidden}
      #root{min-height:100dvh}
      #splash{position:fixed;inset:0;background:#020617;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s ease}
      #splash.out{opacity:0;pointer-events:none}
      .sp-logo{width:56px;height:56px;object-fit:contain;margin-bottom:24px;animation:fp .8s ease-in-out infinite alternate}
      @keyframes fp{from{transform:scale(1);opacity:.8}to{transform:scale(1.08);opacity:1}}
      .sp-ring{width:36px;height:36px;border:3px solid rgba(249,115,22,.25);border-top-color:#f97316;border-radius:50%;animation:spin .7s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
      .sp-text{margin-top:14px;font-size:12px;font-weight:600;color:#475569;letter-spacing:.06em}
    </style>

  <body>
    <div id="splash" role="status" aria-label="Forge&amp;Play yükleniyor">

    </div>

    <a href="#main" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden">Ana içeriğe geç</a>

    <div id="root"></div>

    <script>
      (function(){
        var s=document.getElementById('splash');
        var done=false;
        function hide(){if(done)return;done=true;s&&s.classList.add('out');}
        window.addEventListener('load',function(){setTimeout(hide,400);});
        var obs=new MutationObserver(function(){
          var r=document.getElementById('root');
          if(r&&r.firstChild){setTimeout(hide,200);obs.disconnect();}
        });
        obs.observe(document.getElementById('root'),{childList:true});
        setTimeout(hide,4000); // maksimum 4 saniye
      })();
    </script>
