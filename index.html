    <!-- ═══════════════════════════════════════════════════════════
         CRITICAL CSS — Above the fold
         ══════════════════════════════════════════════════════════ -->
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html{scroll-behavior:smooth;text-size-adjust:100%;-webkit-text-size-adjust:100%}
      body{background-color:#020617;color:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;line-height:1.5;overflow-x:hidden}
      #root{min-height:100dvh;display:flex;flex-direction:column}
      /* Loading skeleton */
      #app-loading{position:fixed;inset:0;background:#020617;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s}
      #app-loading.hidden{opacity:0;pointer-events:none}
      .spinner{width:40px;height:40px;border:3px solid rgba(249,115,22,.2);border-top-color:#f97316;border-radius:50%;animation:spin .8s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
      .loader-logo{width:48px;height:48px;object-fit:contain;margin-bottom:20px;animation:pulse 2s ease-in-out infinite}
      @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.95)}}
      .loader-text{margin-top:16px;font-size:13px;font-weight:600;color:#64748b;letter-spacing:.05em}
      /* Prevent FOUC */
      .no-fouc{visibility:hidden}
    </style>
  </head>

  <body>
    <!-- Loading ekranı — React yüklenene kadar göster -->
    <div id="app-loading" role="status" aria-label="Yükleniyor">
      <img
        src="https://i.ibb.co/HppdF5nY/freepik-minimal-futuristic-gaming-logo-forge-hammer-combin-64278.png"
        alt="Forge&Play"
        class="loader-logo"
        width="48"
        height="48"
      />
      <div class="spinner"></div>
      <p class="loader-text">Forge&amp;Play yükleniyor…</p>
    </div>

    <!-- Accessibility: Skip to main content -->
    <a
      href="#main-content"
      class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-[99999] focus:px-4 focus:py-2 focus:bg-orange-500 focus:text-white focus:rounded-lg focus:font-bold"
    >
      Ana içeriğe geç
    </a>

    <!-- React root -->
    <div id="root"></div>

    <!-- Loading ekranı gizle -->
    <script>
      window.addEventListener('load', () => {
        const loader = document.getElementById('app-loading');
        if (loader) setTimeout(() => loader.classList.add('hidden'), 300);
      });
      // React hazır olunca da gizle
      document.addEventListener('DOMContentLoaded', () => {
        const observer = new MutationObserver(() => {
          const root = document.getElementById('root');
          if (root && root.children.length > 0) {
            const loader = document.getElementById('app-loading');
            if (loader) setTimeout(() => loader.classList.add('hidden'), 200);
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      });
    </script>

    <!-- Vite entry point -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
